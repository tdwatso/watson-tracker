let roloTeamFilter = 'all';

const WATSON_TEAM = new Set([
  'casey rusin','eddie wheeler','jay gilchrist','zach jones',
  'ben velishek','nick enevoldsen','savannah mattas'
]);

function isWatsonRow(r) {
  const vals = [r.ddcGSM,r.opsGSM,r.vatGSM,r.vinGSM].map(v=>(v||'').toLowerCase());
  return vals.some(v=>WATSON_TEAM.has(v));
}

function roloTeam(t, btn) {
  roloTeamFilter = t;
  document.querySelectorAll('.rolo-filter').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  roloFilter();
}

function hl(text, q) {
  if (!q || !text) return escR(text||'');
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
  return escR(text).replace(re, '<mark style="background:#fef08a;border-radius:2px">$1</mark>');
}

function escR(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function cell(val, q, cls) {
  return `<td class="${cls||''}">${hl(val,q)}</td>`;
}

function teamCell(val, q) {
  const isWatson = WATSON_TEAM.has((val||'').toLowerCase());
  return `<td class="${isWatson?'team':'muted'}">${hl(val,q)}</td>`;

function roloAccountCell(caid, name, q) {
  const link = SFX_CAID[caid];

    return '<a href="' + link + '" target="_blank" style="color:var(--blue);text-decoration:none;font-weight:600" title="Open in Salesforce">' + hText + ' ↗</a>';

function roloFilter() {
  const q = (document.getElementById('rolo-search').value||'').trim().toLowerCase();
  const tbody = document.getElementById('rolo-tbody');
  const count = document.getElementById('rolo-count');
  if (!tbody) return;

  let data = ROLO_DATA;

  // BU filter
  if (roloTeamFilter !== 'all') {
    data = data.filter(r => {
      if (roloTeamFilter==='ddc') return r.ddcGSM;
      if (roloTeamFilter==='ops') return r.opsGSM;
      if (roloTeamFilter==='vat') return r.vatGSM;
      if (roloTeamFilter==='vin') return r.vinGSM;
      return true;
    });
  }

  // Text search
  if (q) {
    data = data.filter(r => {
      const searchable = [r.g,r.a,r.id,r.ddcGSM,r.ddcPM,r.opsGSM,r.opsPM,r.vatGSM,r.vatPM,r.vinGSM,r.vinPM,r.ssd,r.atc,r.ico,r.amp,r.seg].join(' ').toLowerCase();
      return searchable.includes(q);
    });
  }

  count.textContent = `${data.length.toLocaleString()} result${data.length!==1?'s':''}`;

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="16" class="rolo-empty">No results found</td></tr>';
    return;
  }

  // Cap at 500 rows for performance
  const display = data.slice(0, 500);
  tbody.innerHTML = display.map(r => `<tr>
    <td class="grp">${hl(r.g,q)}</td>
    <td>${roloAccountCell(r.id, r.a, q)}</td>
    ${cell(r.id,q,'muted')}
    ${cell(r.seg,q,'muted')}
    ${teamCell(r.ddcGSM,q)}
    ${cell(r.ddcPM,q,'muted')}
    ${teamCell(r.opsGSM,q)}
    ${cell(r.opsPM,q,'muted')}
    ${teamCell(r.vatGSM,q)}
    ${cell(r.vatPM,q,'muted')}
    ${teamCell(r.vinGSM,q)}
    ${cell(r.vinPM,q,'muted')}
    ${cell(r.ssd,q,'muted')}
    ${cell(r.atc,q,'muted')}
    ${cell(r.ico,q,'muted')}
    
  </tr>`).join('');

  if (data.length > 500) {
    tbody.innerHTML += `<tr><td colspan="16" style="text-align:center;padding:12px;color:var(--muted);font-size:11px">Showing 500 of ${data.length} results — refine your search to see more</td></tr>`;
  }
}


// ── GSM PAY CALCULATOR ──
const PAY_TABLE = [
  {minA:0,      maxA:0.40,   mult:0.30},
  {minA:0.4001, maxA:0.60,   mult:0.50},
  {minA:0.6001, maxA:0.90,   mult:0.80},
  {minA:0.9001, maxA:1.00,   mult:1.00},
  {minA:1.0001, maxA:1.20,   mult:1.10},
  {minA:1.2001, maxA:1.50,   mult:1.30},
  {minA:1.5001, maxA:2.00,   mult:1.75},
  {minA:2.0001, maxA:2.25,   mult:2.00},
  {minA:2.2501, maxA:2.50,   mult:2.25},
  {minA:2.5001, maxA:999,    mult:null} // >250% special
];

// TI stored per rep (user-editable)
const REP_TI = {
  savannah:21250, nick:21250, casey:21250,
  zach:21250, ben:21250, jay:21250, eddie:21250
};

function calcPayout(attainment, ti) {
  if (attainment <= 0 || ti <= 0) return 0;
  const a = attainment;
  if (a > 2.50) return (a + 3.125) * ti;
  for (const tier of PAY_TABLE) {
    if (a >= tier.minA && (tier.maxA === 999 || a <= tier.maxA)) {
      if (tier.mult === null) return (a + 3.125) * ti;
      return a * ti * tier.mult;
    }
  }
  return 0;
}

function getMultiplier(attainment) {
  if (attainment <= 0) return 0;
  const a = attainment;
  if (a > 2.50) return (a + 3.125) / a;  // effective
  for (const tier of PAY_TABLE) {
    if (a >= tier.minA && (tier.maxA === 999 || a <= tier.maxA)) {
      return tier.mult || (a + 3.125) / a;
    }
  }
  return 0;
}

function buildCalcPanel(repKey) {
  const d = STATE[repKey], r = REPS[repKey];
  const ti = REP_TI[repKey] || 21250;
  const target = d.target;
  const cw = d.qtotal;
  const attainment = target > 0 ? cw / target : 0;
  const payout = calcPayout(attainment, ti);
  const mult = getMultiplier(attainment);

  // Monthly breakdown (Apr/May/Jun)
  const months = ['Apr','May','Jun'];
  const cwArr = [d.cw1, d.cw2, d.cw3];
  const tgtArr = [d.cw1t, d.cw2t, d.cw3t];

  // Tier display
  const tiers = [
    {label:'0–40%',   pct:'0–40%',   mult:0.30, threshold:0},
    {label:'40–60%',  pct:'40–60%',  mult:0.50, threshold:0.40*target},
    {label:'60–90%',  pct:'60–90%',  mult:0.80, threshold:0.60*target},
    {label:'90–100%', pct:'90–100%', mult:1.00, threshold:0.90*target},
    {label:'100–120%',pct:'100–120%',mult:1.10, threshold:1.00*target},
    {label:'120–150%',pct:'120–150%',mult:1.30, threshold:1.20*target},
    {label:'150–200%',pct:'150–200%',mult:1.75, threshold:1.50*target},
    {label:'200–225%',pct:'200–225%',mult:2.00, threshold:2.00*target},
    {label:'225–250%',pct:'225–250%',mult:2.25, threshold:2.25*target},
    {label:'>250%',   pct:'>250%',   mult:'★',  threshold:2.50*target},
  ];

  // Find current tier index
  const currentTierIdx = (() => {
    for (let i = tiers.length-1; i >= 0; i--) {
      if (cw >= tiers[i].threshold) return i;
    }
    return 0;
  })();

  // Next tier
  const nextTierIdx = currentTierIdx < tiers.length - 1 ? currentTierIdx + 1 : null;

  const tierHTML = tiers.map((t, i) => {
    const isAchieved = i < currentTierIdx;
    const isCurrent = i === currentTierIdx;
    const isNext = i === nextTierIdx;
    const need = t.threshold - cw;
    let cls = '';
    if (isAchieved) cls = 'achieved';
    else if (isCurrent) cls = 'active';
    else if (isNext) cls = 'next-target';
    const multLabel = typeof t.mult === 'number' ? t.mult.toFixed(2)+'x' : t.mult;
    const needStr = isAchieved ? '✓' : isCurrent ? 'Current' : need > 0 ? fmt(need)+' away' : '✓';
    return `<div class="calc-tier ${cls}">
      <div class="calc-tier-pct">${t.pct}</div>
      <div class="calc-tier-mult" style="color:${isAchieved?'var(--green)':isCurrent?'var(--blue)':isNext?'var(--orange)':'var(--muted)'}">${multLabel}</div>
      <div class="calc-tier-need">${needStr}</div>
    </div>`;
  }).join('');

  return `<div class="calc-panel" id="${repKey}-calc-panel">
    <div class="calc-panel-hdr">
      <h3>💰 Commission Calculator</h3>
      <span>2026 MRR Bookings Plan · Q2</span>
    </div>
    <div class="calc-body">
      <div class="calc-grid">
        <div class="calc-item">
          <div class="calc-lbl">Q2 Target (Quota)</div>
          <div class="calc-val">${fmt(target)}</div>
        </div>
        <div class="calc-item">
          <div class="calc-lbl">Q2 Closed Won</div>
          <div class="calc-val" id="${repKey}-calc-cw">${fmt(cw)}</div>
        </div>
        <div class="calc-item">
          <div class="calc-lbl">Quarterly Attainment</div>
          <div class="calc-val" id="${repKey}-calc-att" style="color:${attainment>=1?'var(--green)':attainment>=.9?'var(--amber)':'var(--red)'}">${(attainment*100).toFixed(1)}%</div>
        </div>
        <div class="calc-item">
          <div class="calc-lbl">Active Multiplier</div>
          <div class="calc-val" id="${repKey}-calc-mult" style="color:var(--blue)">${typeof mult==='number'?mult.toFixed(2)+'x':'—'}</div>
        </div>
        <div class="calc-item">
          <div class="calc-lbl">Q2 Target Incentive (TI)</div>
          <div class="calc-val" style="color:var(--navy)">$21,250</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">🔒 Fixed — not editable</div>
        </div>
      </div>

      <div class="calc-payout-card" id="${repKey}-payout-card" style="border-color:${payout>0?'var(--green)':'var(--border)'}">
        <div class="calc-pay-item">
          <div class="calc-pay-lbl">Estimated Payout</div>
          <div class="calc-pay-val" id="${repKey}-calc-payout" style="color:${payout>0?'var(--green)':'var(--muted)'}">${fmt(payout)}</div>
        </div>
        <div class="calc-pay-item">
          <div class="calc-pay-lbl">Target Incentive</div>
          <div class="calc-pay-val" style="color:var(--navy)">${fmt(ti)}</div>
        </div>
        <div class="calc-pay-item">
          <div class="calc-pay-lbl">Payout vs TI</div>
          <div class="calc-pay-val" id="${repKey}-calc-vs" style="color:${payout>ti?'var(--green)':payout>0?'var(--amber)':'var(--muted)'}">${ti>0?((payout/ti)*100).toFixed(0)+'%':'—'}</div>
        </div>
      </div>

      <div class="calc-tier-bar" style="margin-top:16px">
        <div class="calc-tier-hdr">Commission Tier Progression</div>
        <div class="calc-tiers" id="${repKey}-tiers">${tierHTML}</div>
      </div>
    </div>
  </div>`;
}

function updateTI(repKey, val) {
  REP_TI[repKey] = parseFloat(val) || 0;
  refreshCalc(repKey);
}

function refreshCalc(repKey) {
  const d = STATE[repKey], r = REPS[repKey];
  const ti = REP_TI[repKey] || 0;
  const target = d.target;
  const cw = d.qtotal;
  const attainment = target > 0 ? cw / target : 0;
  const payout = calcPayout(attainment, ti);
  const mult = getMultiplier(attainment);

  const get = id => document.getElementById(repKey+'-'+id);
  if (get('calc-cw')) get('calc-cw').textContent = fmt(cw);
  if (get('calc-att')) {
    get('calc-att').textContent = (attainment*100).toFixed(1)+'%';
    get('calc-att').style.color = attainment>=1?'var(--green)':attainment>=.9?'var(--amber)':'var(--red)';
  }
  if (get('calc-mult')) get('calc-mult').textContent = typeof mult==='number'?mult.toFixed(2)+'x':'—';
  if (get('calc-payout')) {
    get('calc-payout').textContent = fmt(payout);
    get('calc-payout').style.color = payout>0?'var(--green)':'var(--muted)';
  }
  if (get('calc-vs')) {
    get('calc-vs').textContent = ti>0?((payout/ti)*100).toFixed(0)+'%':'—';
    get('calc-vs').style.color = payout>ti?'var(--green)':payout>0?'var(--amber)':'var(--muted)';
  }
  if (get('payout-card')) {
    get('payout-card').style.borderColor = payout>0?'var(--green)':'var(--border)';
  }

  // Rebuild tier bars
  const tiers = [
    {pct:'0–40%',   mult:0.30, threshold:0},
    {pct:'40–60%',  mult:0.50, threshold:0.40*target},
    {pct:'60–90%',  mult:0.80, threshold:0.60*target},
    {pct:'90–100%', mult:1.00, threshold:0.90*target},
    {pct:'100–120%',mult:1.10, threshold:1.00*target},
    {pct:'120–150%',mult:1.30, threshold:1.20*target},
    {pct:'150–200%',mult:1.75, threshold:1.50*target},
    {pct:'200–225%',mult:2.00, threshold:2.00*target},
    {pct:'225–250%',mult:2.25, threshold:2.25*target},
    {pct:'>250%',   mult:'★',  threshold:2.50*target},
  ];
  const curIdx = (() => { for(let i=tiers.length-1;i>=0;i--){ if(cw>=tiers[i].threshold)return i; } return 0; })();
  const nextIdx = curIdx < tiers.length-1 ? curIdx+1 : null;
  const tiersEl = get('tiers');
  if (tiersEl) {
    tiersEl.innerHTML = tiers.map((t,i)=>{
      const isAchieved=i<curIdx, isCurrent=i===curIdx, isNext=i===nextIdx;
      let cls=isAchieved?'achieved':isCurrent?'active':isNext?'next-target':'';
      const multLabel=typeof t.mult==='number'?t.mult.toFixed(2)+'x':t.mult;
      const need=t.threshold-cw;
      const needStr=isAchieved?'✓':isCurrent?'Current':need>0?fmt(need)+' away':'✓';
      return `<div class="calc-tier ${cls}">
        <div class="calc-tier-pct">${t.pct}</div>
        <div class="calc-tier-mult" style="color:${isAchieved?'var(--green)':isCurrent?'var(--blue)':isNext?'var(--orange)':'var(--muted)'}">${multLabel}</div>
        <div class="calc-tier-need">${needStr}</div>
      </div>`;
    }).join('');
  }
}
